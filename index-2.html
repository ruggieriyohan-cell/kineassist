// ── CRYPTO ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = "ka_patients_v2";
const CONSENT_KEY = "ka_consent_v2";
const KEY_STORE   = "ka_crypt_key";

async function getOrCreateKey() {
  const raw = localStorage.getItem(KEY_STORE);
  if (raw) {
    const kb = Uint8Array.from(atob(raw), c => c.charCodeAt(0));
    return crypto.subtle.importKey("raw", kb, "AES-GCM", false, ["encrypt","decrypt"]);
  }
  const key = await crypto.subtle.generateKey({name:"AES-GCM",length:256}, true, ["encrypt","decrypt"]);
  const exp = await crypto.subtle.exportKey("raw", key);
  localStorage.setItem(KEY_STORE, btoa(String.fromCharCode(...new Uint8Array(exp))));
  return key;
}
async function encrypt(data) {
  const key = await getOrCreateKey();
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const ct  = await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, new TextEncoder().encode(JSON.stringify(data)));
  const buf = new Uint8Array(iv.length + ct.byteLength);
  buf.set(iv); buf.set(new Uint8Array(ct), iv.length);
  return btoa(String.fromCharCode(...buf));
}
async function decrypt(b64) {
  try {
    const key = await getOrCreateKey();
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const pt  = await crypto.subtle.decrypt({name:"AES-GCM",iv:raw.slice(0,12)}, key, raw.slice(12));
    return JSON.parse(new TextDecoder().decode(pt));
  } catch { return null; }
}
async function savePatients(list) { localStorage.setItem(STORAGE_KEY, await encrypt(list)); }
async function loadPatients()     { const r=localStorage.getItem(STORAGE_KEY); return r ? (await decrypt(r))||[] : []; }

// ── AI ───────────────────────────────────────────────────────────────────────
const SYS_BILAN = `Tu es kinésithérapeute expert. JSON brut uniquement, SANS backticks, SANS texte avant/après. Max 3 pathologies, max 3 catégories de tests (3 tests chacune max), max 3 évaluations. Phrases courtes.
{"pathologies_probables":[{"nom":"...","probabilite":"haute|moyenne|faible","region":"..."}],"tests_recommandes":[{"categorie":"...","tests":[{"nom":"...","technique":"...","interpretation":"..."}]}],"evaluations_requises":[{"type":"Force musculaire|Mobilité|Sensibilité|Neurologique|Fonctionnel|Respiratoire","muscles_articulations":["..."],"outils":["..."],"cotations":["..."]}],"questions_complementaires":["..."]}`;

const SYS_ANALYSE = `Tu es kinésithérapeute expert. JSON brut uniquement, SANS backticks, SANS texte avant/après. Phrases courtes et concises. Max 3 diag diff, max 4 drapeaux rouges, max 3 drapeaux jaunes, max 4 techniques par phase, max 4 conseils, max 3 objectifs mesurables.
{"pathologie_retenue":"...","certitude":"haute|moyenne|faible","description":"...","mecanisme":"...","diagnostics_differentiels":[{"nom":"...","distinction":"..."}],"drapeaux_rouges":[{"signe":"...","signification":"...","action":"..."}],"drapeaux_jaunes":["..."],"bilan_complementaire":["..."],"plan_traitement":{"phase_aigue":{"duree":"...","objectifs":["..."],"techniques":["..."],"frequence":"..."},"phase_subAigue":{"duree":"...","objectifs":["..."],"techniques":["..."],"frequence":"..."},"phase_chronique":{"duree":"...","objectifs":["..."],"techniques":["..."],"frequence":"..."}},"objectifs_mesurables":["..."],"conseils_patient":["..."],"criteres_retour_activite":["..."],"pronostic":"...","delai_reevaluation":"..."}`;

async function callAI(system, message) {
  const apiKey = localStorage.getItem("ka_api_key") || "";
  if (!apiKey) throw new Error("Clé API manquante — configurez-la dans Paramètres");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type":"application/json", "anthropic-dangerous-direct-browser-access":"true", "x-api-key": apiKey },
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:8000, system, messages:[{role:"user",content:message}] })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error?.message || "Erreur API "+res.status);
  const text = (data.content||[]).map(b=>b.text||"").join("").trim()
    .replace(/^```json\s*/i,"").replace(/^```/,"").replace(/```\s*$/,"").trim();
  return JSON.parse(text);
}

  const topRef = useRef();

  useEffect(()=>{
    setConsented(!!localStorage.getItem(CONSENT_KEY));

      const el = document.getElementById("splash");

    if("serviceWorker" in navigator){

  const acceptConsent = () => { localStorage.setItem(CONSENT_KEY,"1"); setConsented(true); };
  const upd  = (k,v) => setForm(p=>({...p,[k]:v}));
  const updA = (k,v) => setAssess(p=>({...p,[k]:v}));
  const scrollTop = () => setTimeout(()=>topRef.current?.scrollIntoView({behavior:"smooth"}),60);

  const newBilan = () => {
    setStep(1); setForm({}); setRegion(""); setSymptoms(""); setMode("symptoms");
    setGuide(null); setAssess({}); setResult(null); setError("");
    setView("new"); scrollTop();
  };

  const getGuide = async () => {
    setLoading(true); setLoadMsg("Génération du bilan guidé..."); setError("");

  };

  const printResult = () => window.print();

  const [apiKey, setApiKey] = React.useState(localStorage.getItem("ka_api_key")||"");

    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"#0a0f1a"}}>

        <div style={{fontSize:36,textAlign:"center",marginBottom:12}}>🔑</div>

            <div>
              {(result.diagnostics_differentiels||[]).map((d,i)=>(
                <div key={i} style={{...card,borderLeft:`3px solid ${C.purple}`,marginBottom:10}}>
                  <div style={{fontWeight:700,color:"#c4b5fd",marginBottom:4,fontSize:14}}>{d.nom}</div>
                  <div style={{fontSize:13,color:C.dim}}>{d.distinction}</div>
                </div>
              ))}
            </div>
          )}

          {resTab==="flags" && (
            <div>
              {(result.drapeaux_rouges||[]).map((d,i)=>(
                <div key={i} style={{background:"rgba(248,113,113,0.07)",border:"1px solid rgba(248,113,113,0.2)",borderLeft:`4px solid ${C.red}`,borderRadius:10,padding:14,marginBottom:10}}>
                  <div style={{fontWeight:700,color:C.red,marginBottom:4}}>⚠️ {d.signe}</div>
                  <div style={{fontSize:13,color:"#fca5a5",marginBottom:4}}>{d.signification}</div>
                  <div style={{fontSize:12,color:C.dim,fontStyle:"italic"}}>→ {d.action}</div>
                </div>
              ))}
              {(result.drapeaux_jaunes||[]).length>0 && (
                <div style={{background:"rgba(251,191,36,0.07)",border:"1px solid rgba(251,191,36,0.2)",borderLeft:`4px solid ${C.yellow}`,borderRadius:10,padding:14}}>
                  <div style={{fontWeight:700,color:C.yellow,marginBottom:8}}>🟡 Drapeaux jaunes</div>
                  <ul style={{paddingLeft:18,color:C.dim,fontSize:13,lineHeight:2,margin:0}}>
                    {result.drapeaux_jaunes.map((d,i)=><li key={i}>{d}</li>)}
                  </ul>
                </div>
              )}
            </div>
          )}

          {resTab==="traitement" && result.plan_traitement && (
            <div>
              {[
                {key:"phase_aigue",label:"Phase aiguë",color:C.red,icon:"🔴"},
                {key:"phase_subAigue",label:"Phase sub-aiguë",color:C.yellow,icon:"🟡"},
                {key:"phase_chronique",label:"Phase chronique",color:C.green,icon:"🟢"},
              ].map(({key,label,color,icon})=>{
                const ph=result.plan_traitement[key];
                if(!ph) return null;
                return (
                  <div key={key} style={{...card,borderLeft:`3px solid ${color}`,marginBottom:12}}>
                    <div style={{fontWeight:700,color,marginBottom:2}}>{icon} {label}</div>
                    {ph.duree && <div style={{fontSize:11,color:C.muted,marginBottom:8}}>⏱ {ph.duree}{ph.frequence?" · "+ph.frequence:""}</div>}
                    {ph.objectifs?.length>0 && (
                      <>
                        <div style={{...sec,marginTop:8}}>Objectifs</div>
                        <ul style={{paddingLeft:18,color:C.dim,fontSize:13,lineHeight:1.8,margin:0}}>
                          {ph.objectifs.map((o,i)=><li key={i}>{o}</li>)}
                        </ul>
                      </>
                    )}
                    {ph.techniques?.length>0 && (
                      <>
                        <div style={{...sec,marginTop:8}}>Techniques</div>
                        <ul style={{paddingLeft:18,color:C.dim,fontSize:13,lineHeight:1.8,margin:0}}>
                          {ph.techniques.map((t,i)=><li key={i}>{t}</li>)}
                        </ul>
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {resTab==="conseils" && (
            <div>
              {result.conseils_patient?.length>0 && (
                <div style={{...card,borderLeft:`3px solid ${C.blue}`,marginBottom:12}}>
                  <div style={{...sec,marginTop:0}}>💬 Conseils au patient</div>
                  <ul style={{paddingLeft:18,color:C.dim,fontSize:13,lineHeight:2,margin:0}}>
                    {result.conseils_patient.map((c,i)=><li key={i}>{c}</li>)}
                  </ul>
                </div>
              )}
              {result.criteres_retour_activite?.length>0 && (
                <div style={{...card,borderLeft:`3px solid ${C.green}`}}>
                  <div style={{...sec,marginTop:0}}>✅ Retour à l'activité</div>
                  <ul style={{paddingLeft:18,color:C.dim,fontSize:13,lineHeight:2,margin:0}}>
                    {result.criteres_retour_activite.map((c,i)=><li key={i}>{c}</li>)}
                  </ul>
                </div>
              )}
            </div>
          )}

          <button onClick={newBilan} style={{...btn("ghost"),width:"100%",marginTop:16}}>
            ↩ Nouveau bilan
          </button>
        </div>
      )}
      </>
      )}

      <BottomNav view={view} setView={setView} newBilan={newBilan}/>
    </Page>
  );

  return null;
}

// Mount
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<style>
@media print {
  .bottom-nav, button { display: none !important; }
  body { background: white !important; color: black !important; }
}
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
</style>
</body>
</html>
